name: platform-ef-develop

# =========================================================================
# DEVELOP 환경 - API Documentation
# =========================================================================

services:
  # -------------------------
  # API Documentation - Develop
  # -------------------------
  platform-ef-develop-doc:
    image: spa-nginx:1.0.8
    container_name: platform-ef-develop-doc
    restart: unless-stopped
    volumes:
      - /home/fingate/docker/volumes/platform/ef-develop/front/doc:/usr/share/nginx/html:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.platform-ef-develop-doc.rule=Host(`eventflow-dev.doc.fingate.kr`)
      - traefik.http.routers.platform-ef-develop-doc.entrypoints=web
      - traefik.http.services.platform-ef-develop-doc.loadbalancer.server.port=80
      - traefik.docker.network=edge
    networks: [edge, monitor]

  platform-ef-develop-doc-metrics:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: platform-ef-develop-doc-metrics
    restart: unless-stopped
    depends_on: [platform-ef-develop-doc]
    command: ["-nginx.scrape-uri=http://platform-ef-develop-doc:8081/stub_status"]
    networks: [monitor]

networks:
  edge:
    external: true
  monitor:
    external: true
