name: platform-ef

# =========================================================================
# PRODUCTION 환경 (main 브랜치)
# =========================================================================

services:
  # -------------------------
  # Front Application - Production
  # -------------------------
  platform-ef-web:
    image: spa-nginx:1.0.8
    container_name: platform-ef-web
    restart: unless-stopped
    volumes:
      - /home/fingate/docker/volumes/platform/ef/front/web:/usr/share/nginx/html:ro
      - /etc/localtime:/etc/localtime:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.platform-ef-web.rule=Host(`eventflow.fingate.kr`)
      - traefik.http.routers.platform-ef-web.entrypoints=web
      - traefik.http.services.platform-ef-web.loadbalancer.server.port=80
      - traefik.docker.network=edge
    networks: [edge, monitor]

  platform-ef-web-metrics:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: platform-ef-web-metrics
    restart: unless-stopped
    depends_on: [platform-ef-web]
    command: ["-nginx.scrape-uri=http://platform-ef-web:8081/stub_status"]
    networks: [monitor]

networks:
  edge:
    external: true
  monitor:
    external: true
