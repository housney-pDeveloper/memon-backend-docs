stages:
  - deploy

variables:
  FRONT_PRJ: "doc"
  PROJECT_NAME: "platform-ef"
  PROJECT_DIR_NAME: "platform/ef"

  # ------------------------------------------------------------
  # 배포 경로 (develop 환경만)
  # ------------------------------------------------------------
  DEPLOY_DEV: "/home/fingate/docker/volumes/${PROJECT_DIR_NAME}-develop/front/${FRONT_PRJ}"

  # ------------------------------------------------------------
  # docker-compose 파일
  # ------------------------------------------------------------
  COMPOSE_DEV: "/home/fingate/docker/containers/${PROJECT_DIR_NAME}/front/docker-compose.doc.yml"

  # ------------------------------------------------------------
  # compose 서비스 이름
  # ------------------------------------------------------------
  CONTAINER_NAME_DEV: "$PROJECT_NAME-develop-$FRONT_PRJ"

default:
  tags: [platform-ef-web]
  before_script:
    - echo "Docs CI on $(hostname) as $(whoami)"
    - ls -al

# ====================================================================
# DOCS DEPLOY (main 브랜치 → develop 환경)
# ====================================================================
deploy_docs:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - when: never
  script:
    # 배포 디렉토리 생성 및 정리
    - mkdir -p "$DEPLOY_DEV"
    - rm -rf "${DEPLOY_DEV:?}/"*

    # 정적 HTML 파일 복사 (docs-api 폴더만 배포)
    - cp -r ./docs-api/* "$DEPLOY_DEV/"

    # Docker 컨테이너 재시작
    - docker compose -f "$COMPOSE_DEV" up -d --no-deps ${CONTAINER_NAME_DEV}
    - docker logs --tail 50 ${CONTAINER_NAME_DEV} || true
  environment:
    name: docs
